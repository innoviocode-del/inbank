name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/site/**'
      - 'app/docs/**'
      - 'pkg/brand/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build brand package
        run: pnpm --filter @luxbank/brand build

      - name: Build marketing site
        env:
          GITHUB_PAGES: "true"
        run: pnpm --filter @luxbank/site build

      - name: Build docs site
        env:
          GITHUB_PAGES: "true"
        run: |
          cd app/docs
          pnpm build
          pnpm export || true

      - name: Combine outputs
        run: |
          # Marketing site is the root
          mkdir -p ./combined-output
          cp -r ./app/site/out/* ./combined-output/

          # Docs goes to /docs subdirectory
          mkdir -p ./combined-output/docs
          if [ -d "./app/docs/out" ]; then
            cp -r ./app/docs/out/* ./combined-output/docs/
          elif [ -d "./app/docs/.next/static" ]; then
            cp -r ./app/docs/.next/static ./combined-output/docs/_next/static
          fi

          # Add .nojekyll to prevent Jekyll processing
          touch ./combined-output/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined-output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
