name: Build & Deploy Bank

on:
  push:
    branches: [main]
    paths:
      - 'app/api/**'
      - 'app/dash/**'
      - 'app/admin/**'
      - 'pkg/**'
      - 'k8s/**'
      - '.github/workflows/build-deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/luxfi

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: lux-build-linux-amd64
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: bank-api
            context: .
            dockerfile: app/api/Dockerfile
          - app: bank-dash
            context: .
            dockerfile: app/dash/Dockerfile
          - app: bank-admin
            context: .
            dockerfile: app/admin/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            NEXT_PUBLIC_BASE_URL=https://api.lux.financial
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Make package public
        if: success()
        run: |
          curl -X PATCH -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/luxfi/packages/container/${{ matrix.app }}" \
            -d '{"visibility":"public"}' || true

  deploy:
    name: Deploy to lux-k8s
    runs-on: lux-build-linux-amd64
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save lux-k8s

      - name: Update image tags
        run: |
          cd k8s
          kubectl set image deployment/bank-api bank-api=${{ env.IMAGE_PREFIX }}/bank-api:${{ github.sha }} -n lux-bank || true
          kubectl set image deployment/bank-dash bank-dash=${{ env.IMAGE_PREFIX }}/bank-dash:${{ github.sha }} -n lux-bank || true
          kubectl set image deployment/bank-admin bank-admin=${{ env.IMAGE_PREFIX }}/bank-admin:${{ github.sha }} -n lux-bank || true

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/bank-api -n lux-bank --timeout=300s || true
          kubectl rollout status deployment/bank-dash -n lux-bank --timeout=300s || true
          kubectl rollout status deployment/bank-admin -n lux-bank --timeout=300s || true
